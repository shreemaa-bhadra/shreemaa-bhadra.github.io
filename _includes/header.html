<header class="site-header" role="banner">
    <div class="wrapper">
        <a class="site-logo-link" href="{{ "/" | relative_url }}">
            <img class="site-logo" src="{{ '/assets/logo.png' | relative_url }}" alt="{{ site.title }}" />
        </a>

        {%- if page_header_menu != false -%}
        <nav class="site-nav">
            <input type="checkbox" id="nav-trigger" class="nav-trigger" />
            <label for="nav-trigger">
                <span class="menu-icon">
                    <svg viewBox="0 0 18 15" width="18px" height="15px">
                        <path
                            d="M18,1.484c0,0.82-0.665,1.484-1.484,1.484H1.484C0.665,2.969,0,2.304,0,1.484l0,0C0,0.665,0.665,0,1.484,0 h15.032C17.335,0,18,0.665,18,1.484L18,1.484z M18,7.234c0,0.82-0.665,1.483-1.484,1.483H1.484c-0.819,0-1.484-0.663-1.484-1.483 l0,0c0-0.819,0.665-1.484,1.484-1.484h15.032C17.335,5.75,18,6.415,18,7.234L18,7.234z M18,12.984c0,0.82-0.665,1.484-1.484,1.484H1.484 c-0.819,0-1.484-0.664-1.484-1.484c0-0.819,0.665-1.483,1.484-1.483h15.032C17.335,11.501,18,12.165,18,12.984L18,12.984z" />
                    </svg>
                </span>
            </label>

            <div class="trigger">
                <a class="page-link" href="{{ "/" | relative_url }}">Home</a>
                <a class="page-link" href="{{ "/about/" | relative_url }}">About</a>
                <a class="page-link" href="{{ "/categories/" | relative_url }}">Categories</a>
                {%- for path in page_paths -%}
                {%- assign my_page = site.pages | where: "path", path | first -%}
                {%- if my_page.title and my_page.hide_header != true -%}
                <a class="page-link" href="{{ my_page.url | relative_url }}">{{ my_page.title | escape }}</a>
                {%- endif -%}
                {%- endfor -%}
            </div>
        </nav>
        {%- endif -%}
    </div>
</header>
