<div class="search-section">
    <div class="search-box-wrapper">
        <input type="text" id="search-input" class="search-input-large" placeholder="Search for recipes..."
            autocomplete="off">
        <button class="search-clear-btn" id="search-clear" aria-label="Clear search">&times;</button>
    </div>
    <div id="search-results-container" class="search-results-section">
        <h2 class="search-results-heading">Search Results <span id="search-results-count"></span></h2>
        <div id="search-results" class="post-previews" role="feed" aria-label="Search results"></div>
    </div>
</div>
